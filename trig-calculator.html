<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sine &amp; Cosine Calculator</title>
<style>
  :root{
    --bg:#12151A;
    --panel:#1A1E25;
    --border:#2A2F38;
    --text:#E7EAF0;
    --muted:#8891A0;
    --sine:#5CC8A8;
    --cosine:#D08A57;
    --grid:#232832;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 16px 60px;
    min-height:100vh;
  }
  h1{
    font-size:20px;
    font-weight:600;
    margin:0 0 4px;
  }
  .sub{
    color:var(--muted);
    font-size:13px;
    margin:0 0 28px;
  }
  .layout{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
    max-width:820px;
    width:100%;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px 20px;
  }
  #circle-wrap canvas, #wave-wrap canvas{ display:block; }

  .controls{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .angle-input{
    background:var(--bg);
    border:1px solid var(--border);
    color:var(--text);
    font-size:14px;
    padding:8px 10px;
    border-radius:8px;
    width:90px;
    outline:none;
  }
  .angle-input:focus{ border-color:var(--cosine); }
  .unit-toggle{
    display:flex;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
  }
  .unit-toggle button{
    background:none;
    border:none;
    color:var(--muted);
    font-size:13px;
    padding:8px 14px;
    cursor:pointer;
  }
  .unit-toggle button.active{
    background:var(--cosine);
    color:#241A11;
    font-weight:600;
  }
  #angle-slider{
    width:100%;
    accent-color:var(--cosine);
    margin-bottom:18px;
  }
  .readouts{
    display:flex;
    gap:20px;
  }
  .readout .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    margin-bottom:4px;
  }
  .readout .value{
    font-family:'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
    font-size:22px;
    font-weight:600;
  }
  .readout.sine .value{ color:var(--sine); }
  .readout.cosine .value{ color:var(--cosine); }
  .stage{
    width:100%;
    max-width:760px;
    display:flex;
    flex-direction:column;
    gap:20px;
    align-items:center;
  }
  .legend{
    display:flex;
    gap:18px;
    font-size:12px;
    color:var(--muted);
    margin-top:12px;
  }
  .legend span{ display:flex; align-items:center; gap:6px; }
  .swatch{ width:10px; height:10px; border-radius:2px; display:inline-block; }
</style>
</head>
<body>

<h1>Sine &amp; Cosine Calculator</h1>
<p class="sub">Enter an angle to see its value on the unit circle and on the wave</p>

<div class="stage">
  <div class="panel" style="width:100%;">
    <div class="controls">
      <input type="number" id="angle-number" class="angle-input" value="45" step="1" />
      <div class="unit-toggle">
        <button id="unit-deg" class="active">Degrees</button>
        <button id="unit-rad">Radians</button>
      </div>
    </div>
    <input type="range" id="angle-slider" min="0" max="360" value="45" step="1" />
    <div class="readouts">
      <div class="readout sine">
        <div class="label">sin(θ)</div>
        <div class="value" id="sin-value">0.7071</div>
      </div>
      <div class="readout cosine">
        <div class="label">cos(θ)</div>
        <div class="value" id="cos-value">0.7071</div>
      </div>
    </div>
  </div>

  <div class="layout" style="width:100%;">
    <div class="panel" id="circle-wrap">
      <canvas id="circle-canvas" width="300" height="300"></canvas>
    </div>
    <div class="panel" style="flex:1; min-width:280px;" id="wave-wrap">
      <canvas id="wave-canvas" width="380" height="300"></canvas>
      <div class="legend">
        <span><span class="swatch" style="background:var(--sine);"></span>sine</span>
        <span><span class="swatch" style="background:var(--cosine);"></span>cosine</span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const angleNumber = document.getElementById('angle-number');
  const angleSlider = document.getElementById('angle-slider');
  const unitDegBtn = document.getElementById('unit-deg');
  const unitRadBtn = document.getElementById('unit-rad');
  const sinValueEl = document.getElementById('sin-value');
  const cosValueEl = document.getElementById('cos-value');
  const circleCanvas = document.getElementById('circle-canvas');
  const waveCanvas = document.getElementById('wave-canvas');
  const circleCtx = circleCanvas.getContext('2d');
  const waveCtx = waveCanvas.getContext('2d');

  const COLORS = {
    grid: '#232832',
    axis: '#3A4150',
    text: '#8891A0',
    circle: '#3A4150',
    sine: '#5CC8A8',
    cosine: '#D08A57',
    point: '#E7EAF0'
  };

  let unit = 'deg'; // 'deg' | 'rad'
  let angleDeg = 45;

  function toRadians(deg){ return deg * Math.PI / 180; }

  function setUnit(newUnit){
    if (unit === newUnit) return;
    unit = newUnit;
    unitDegBtn.classList.toggle('active', unit === 'deg');
    unitRadBtn.classList.toggle('active', unit === 'rad');

    if (unit === 'rad'){
      angleNumber.step = '0.1';
      angleNumber.value = (toRadians(angleDeg)).toFixed(2);
      angleSlider.min = 0;
      angleSlider.max = (2 * Math.PI).toFixed(2);
      angleSlider.step = 0.01;
      angleSlider.value = toRadians(angleDeg).toFixed(2);
    } else {
      angleNumber.step = '1';
      angleNumber.value = Math.round(angleDeg);
      angleSlider.min = 0;
      angleSlider.max = 360;
      angleSlider.step = 1;
      angleSlider.value = Math.round(angleDeg);
    }
  }

  function updateFromNumberInput(){
    const raw = parseFloat(angleNumber.value);
    if (isNaN(raw)) return;
    angleDeg = unit === 'rad' ? (raw * 180 / Math.PI) : raw;
    angleSlider.value = raw;
    render();
  }

  function updateFromSlider(){
    const raw = parseFloat(angleSlider.value);
    angleDeg = unit === 'rad' ? (raw * 180 / Math.PI) : raw;
    angleNumber.value = unit === 'rad' ? raw.toFixed(2) : raw;
    render();
  }

  unitDegBtn.addEventListener('click', function(){ setUnit('deg'); render(); });
  unitRadBtn.addEventListener('click', function(){ setUnit('rad'); render(); });
  angleNumber.addEventListener('input', updateFromNumberInput);
  angleSlider.addEventListener('input', updateFromSlider);

  function drawCircle(radians){
    const w = circleCanvas.width, h = circleCanvas.height;
    const cx = w / 2, cy = h / 2;
    const r = Math.min(w, h) / 2 - 30;

    circleCtx.clearRect(0, 0, w, h);

    // axes
    circleCtx.strokeStyle = COLORS.axis;
    circleCtx.lineWidth = 1;
    circleCtx.beginPath();
    circleCtx.moveTo(cx - r - 14, cy); circleCtx.lineTo(cx + r + 14, cy);
    circleCtx.moveTo(cx, cy - r - 14); circleCtx.lineTo(cx, cy + r + 14);
    circleCtx.stroke();

    // circle
    circleCtx.strokeStyle = COLORS.circle;
    circleCtx.lineWidth = 1.5;
    circleCtx.beginPath();
    circleCtx.arc(cx, cy, r, 0, Math.PI * 2);
    circleCtx.stroke();

    const x = cx + r * Math.cos(radians);
    const y = cy - r * Math.sin(radians);

    // cosine projection (x-axis, copper)
    circleCtx.strokeStyle = COLORS.cosine;
    circleCtx.lineWidth = 2.5;
    circleCtx.beginPath();
    circleCtx.moveTo(cx, cy);
    circleCtx.lineTo(x, cy);
    circleCtx.stroke();

    // sine projection (y-axis, teal)
    circleCtx.strokeStyle = COLORS.sine;
    circleCtx.lineWidth = 2.5;
    circleCtx.beginPath();
    circleCtx.moveTo(x, cy);
    circleCtx.lineTo(x, y);
    circleCtx.stroke();

    // radius line
    circleCtx.strokeStyle = COLORS.text;
    circleCtx.lineWidth = 1.5;
    circleCtx.beginPath();
    circleCtx.moveTo(cx, cy);
    circleCtx.lineTo(x, y);
    circleCtx.stroke();

    // point
    circleCtx.fillStyle = COLORS.point;
    circleCtx.beginPath();
    circleCtx.arc(x, y, 5, 0, Math.PI * 2);
    circleCtx.fill();

    // angle label
    circleCtx.fillStyle = COLORS.text;
    circleCtx.font = '11px -apple-system, sans-serif';
    circleCtx.fillText('θ', cx + 16, cy - 6);
  }

  function drawWave(radians){
    const w = waveCanvas.width, h = waveCanvas.height;
    const padding = 24;
    const plotW = w - padding * 2;
    const plotH = h - padding * 2;
    const midY = padding + plotH / 2;

    waveCtx.clearRect(0, 0, w, h);

    // grid
    waveCtx.strokeStyle = COLORS.grid;
    waveCtx.lineWidth = 1;
    for (let gx = 0; gx <= 4; gx++){
      const x = padding + (plotW / 4) * gx;
      waveCtx.beginPath();
      waveCtx.moveTo(x, padding);
      waveCtx.lineTo(x, padding + plotH);
      waveCtx.stroke();
    }
    // axis
    waveCtx.strokeStyle = COLORS.axis;
    waveCtx.beginPath();
    waveCtx.moveTo(padding, midY);
    waveCtx.lineTo(padding + plotW, midY);
    waveCtx.stroke();

    function plot(fn, color){
      waveCtx.strokeStyle = color;
      waveCtx.lineWidth = 2;
      waveCtx.beginPath();
      for (let i = 0; i <= plotW; i++){
        const t = (i / plotW) * Math.PI * 2;
        const val = fn(t);
        const px = padding + i;
        const py = midY - val * (plotH / 2 - 6);
        if (i === 0) waveCtx.moveTo(px, py);
        else waveCtx.lineTo(px, py);
      }
      waveCtx.stroke();
    }

    plot(Math.sin, COLORS.sine);
    plot(Math.cos, COLORS.cosine);

    // current angle marker
    let normalized = radians % (Math.PI * 2);
    if (normalized < 0) normalized += Math.PI * 2;
    const markerX = padding + (normalized / (Math.PI * 2)) * plotW;

    waveCtx.strokeStyle = COLORS.text;
    waveCtx.setLineDash([3, 3]);
    waveCtx.lineWidth = 1;
    waveCtx.beginPath();
    waveCtx.moveTo(markerX, padding);
    waveCtx.lineTo(markerX, padding + plotH);
    waveCtx.stroke();
    waveCtx.setLineDash([]);

    const sinY = midY - Math.sin(normalized) * (plotH / 2 - 6);
    const cosY = midY - Math.cos(normalized) * (plotH / 2 - 6);

    waveCtx.fillStyle = COLORS.sine;
    waveCtx.beginPath();
    waveCtx.arc(markerX, sinY, 4, 0, Math.PI * 2);
    waveCtx.fill();

    waveCtx.fillStyle = COLORS.cosine;
    waveCtx.beginPath();
    waveCtx.arc(markerX, cosY, 4, 0, Math.PI * 2);
    waveCtx.fill();
  }

  function render(){
    const radians = toRadians(angleDeg);
    const sinVal = Math.sin(radians);
    const cosVal = Math.cos(radians);
    sinValueEl.textContent = sinVal.toFixed(4);
    cosValueEl.textContent = cosVal.toFixed(4);
    drawCircle(radians);
    drawWave(radians);
  }

  render();
})();
</script>
</body>
</html>
